<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Packing List{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/static/css/app.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4 no-print">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">Packing List</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="{% url 'member_list' %}">Members</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'destination_list' %}">Destinations</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'activity_list' %}">Activities</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'accommodation_list' %}">Accommodations</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'section_list' %}">Sections</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'item_list' %}">Items</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'trip_list' %}">Trips</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mb-5">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
