{% extends "base.html" %}

{% block title %}Log in — Packing List{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <h1 class="mb-4">Log in</h1>

        {% if form.errors %}
            <div class="alert alert-danger">Invalid username or password.</div>
        {% endif %}

        <form method="post" novalidate>
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label" for="{{ form.username.id_for_label }}">Username</label>
                <input type="text" name="username" autofocus required
                       class="form-control" id="{{ form.username.id_for_label }}"
                       value="{{ form.username.value|default:'' }}">
            </div>
            <div class="mb-3">
                <label class="form-label" for="{{ form.password.id_for_label }}">Password</label>
                <input type="password" name="password" required
                       class="form-control" id="{{ form.password.id_for_label }}">
            </div>
            <button type="submit" class="btn btn-primary">Log in</button>
        </form>
    </div>
</div>
{% endblock %}
