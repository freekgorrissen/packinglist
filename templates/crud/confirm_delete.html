{% extends "base.html" %}

{% block title %}Delete {{ singular }} — Packing List{% endblock %}

{% block content %}
<h1 class="mb-4">Delete {{ singular }}</h1>
<p>Are you sure you want to delete <strong>{{ object }}</strong>?</p>

<form method="post">
    {% csrf_token %}
    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-danger">Delete</button>
        <a class="btn btn-outline-secondary" href="{% url list_url_name %}">Cancel</a>
    </div>
</form>
{% endblock %}
